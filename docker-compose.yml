# Simple Docker setup for the Student Attendance Tracker
# Includes a health check so Docker knows when the app is ready.

services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,web"
    volumes:
      # Keep logs on the host so you can read them easily
      - ./logs:/app/logs
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn --bind 0.0.0.0:8000 student_attendance_tracker.wsgi:application"
    # Health check: Docker calls /health/ every 30 seconds.
    # If it fails 3 times in a row, the container is marked "unhealthy".
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
