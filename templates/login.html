{% extends "base.html" %}
{% block title %}Login | Student Attendance Tracker{% endblock %}
{% block content %}
<section class="card" style="max-width: 520px; margin: 0 auto;">
    <h1 class="title">Welcome Back</h1>
    <p class="subtitle">Login to continue to your attendance dashboard.</p>
    <form method="post" class="mt-4">
        {% csrf_token %}
        <label>Username
            <input type="text" name="username" required value="{{ form_data.username|default:'' }}">
        </label>
        <label class="mt-3">Password
            <input type="password" name="password" required>
        </label>
        <button class="btn btn-primary mt-4" type="submit" style="width: 100%;">Login</button>
    </form>
    <p class="subtitle mt-3">No account? <a href="{% url 'register' %}">Create one here</a>.</p>
</section>
{% endblock %}
