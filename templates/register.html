{% extends "base.html" %}
{% block title %}Register | Student Attendance Tracker{% endblock %}
{% block content %}
<section class="card" style="max-width: 700px; margin: 0 auto;">
    <h1 class="title">Create Your Account</h1>
    <p class="subtitle">Choose your role and start managing attendance in minutes.</p>
    <form method="post" class="mt-4" id="register-form">
        {% csrf_token %}
        <div class="grid grid-2">
            <label>Username
                <input type="text" name="username" required value="{{ form_data.username|default:'' }}">
            </label>
            <label>Email
                <input type="email" name="email" required value="{{ form_data.email|default:'' }}">
            </label>
            <label>Role
                <select name="role" id="role-select" required>
                    <option value="student" {% if form_data.role == "student" %}selected{% endif %}>Student</option>
                    <option value="teacher" {% if form_data.role == "teacher" %}selected{% endif %}>Teacher</option>
                    <option value="admin" {% if form_data.role == "admin" %}selected{% endif %}>Admin</option>
                </select>
            </label>
            <label id="subject-field">Subject (Teachers only)
                <input type="text" name="subject" value="{{ form_data.subject|default:'' }}">
            </label>
            <label>Password
                <input type="password" name="password1" required>
            </label>
            <label>Confirm Password
                <input type="password" name="password2" required>
            </label>
        </div>
        <label class="mt-3">Bio
            <textarea name="bio" rows="3">{{ form_data.bio|default:'' }}</textarea>
        </label>
        <button class="btn btn-primary mt-4" type="submit" style="width: 100%;">Register</button>
    </form>
</section>
<script>
    (function () {
        const roleSelect = document.getElementById("role-select");
        const subjectField = document.getElementById("subject-field");
        function toggleSubject() {
            subjectField.style.display = roleSelect.value === "teacher" ? "block" : "none";
        }
        roleSelect.addEventListener("change", toggleSubject);
        toggleSubject();
    }());
</script>
{% endblock %}
